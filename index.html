<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID Wallet</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ID Wallet">
    
    <link rel="apple-touch-icon" href="icono.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; text-align: center; }
        h1 { color: #333; margin-top: 40px; }
        #fileInput { display: block; margin: 20px auto; padding: 15px; border: 2px dashed #007BFF; border-radius: 10px; background-color: #fff; width: 80%; max-width: 400px; }
        #carnetContainer { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .carnet { position: relative; border-radius: 12px; overflow: hidden; background-color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { max-width: 250px; height: auto; display: block; cursor: pointer; }
        .remove-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; }
        .full-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; justify-content: center; align-items: center; z-index: 1000; }
        .full-screen img { max-width: 95%; max-height: 95%; }
    </style>
</head>
<body>

    <h1>Mis Carnets</h1>
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div id="carnetContainer"></div>
    <div class="full-screen" id="fullScreen"><img id="fullScreenImg" src=""></div>

    <script>
        const container = document.getElementById('carnetContainer');
        const fullScreen = document.getElementById('fullScreen');
        const fullScreenImg = document.getElementById('fullScreenImg');

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('id_v_final') || '[]');
            saved.forEach(data => renderImage(data));
        };

        function renderImage(data) {
            const div = document.createElement('div');
            div.className = 'carnet';
            const img = document.createElement('img');
            img.src = data;
            img.onclick = () => { fullScreenImg.src = data; fullScreen.style.display = 'flex'; };
            const btn = document.createElement('button');
            btn.className = 'remove-btn';
            btn.innerText = 'X';
            btn.onclick = (e) => { e.stopPropagation(); div.remove(); save(); };
            div.append(btn, img);
            container.appendChild(div);
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            for (let file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const tempImg = new Image();
                    tempImg.src = ev.target.result;
                    tempImg.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = 800 / tempImg.width;
                        canvas.width = 800;
                        canvas.height = tempImg.height * scale;
                        ctx.drawImage(tempImg, 0, 0, canvas.width, canvas.height);
                        renderImage(canvas.toDataURL('image/jpeg', 0.7));
                        save();
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        function save() {
            const imgs = Array.from(container.querySelectorAll('img')).map(i => i.src);
            localStorage.setItem('id_v_final', JSON.stringify(imgs));
        }
        fullScreen.onclick = () => fullScreen.style.display = 'none';
    </script>
</body>
</html>
