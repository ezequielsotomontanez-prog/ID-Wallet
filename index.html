<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subida de Carnets</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Carnets">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            -webkit-tap-highlight-color: transparent;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 40px;
        }
        #fileInput {
            display: block;
            margin: 0 auto 20px;
            padding: 15px;
            font-size: 16px;
            border: 2px dashed #007BFF;
            border-radius: 10px;
            cursor: pointer;
            background-color: #fff;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }
        #carnetContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        .carnet {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        img {
            max-width: 250px;
            height: auto;
            display: block;
            cursor: pointer;
        }
        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
        }
        .full-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .full-screen img {
            max-width: 95%;
            max-height: 95%;
            border: none;
        }
    </style>
</head>
<body>
    <h1>Mis Carnets</h1>
    <input type="file" id="fileInput" accept="image/*" multiple>
    
    <div id="carnetContainer"></div>

    <div class="full-screen" id="fullScreen">
        <img id="fullScreenImg" src="" alt="Vista Completa">
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const carnetContainer = document.getElementById('carnetContainer');
        const fullScreen = document.getElementById('fullScreen');
        const fullScreenImg = document.getElementById('fullScreenImg');

        function addImage(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const carnetDiv = document.createElement('div');
                carnetDiv.classList.add('carnet');

                const img = document.createElement('img');
                img.src = e.target.result;

                const removeBtn = document.createElement('button');
                removeBtn.classList.add('remove-btn');
                removeBtn.innerText = 'X';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    carnetDiv.remove();
                };

                img.onclick = () => {
                    fullScreenImg.src = e.target.result;
                    fullScreen.style.display = 'flex';
                };

                carnetDiv.appendChild(removeBtn);
                carnetDiv.appendChild(img);
                carnetContainer.appendChild(carnetDiv);
            };
            reader.readAsDataURL(file);
        }

        fileInput.addEventListener('change', (event) => {
            const files = event.target.files;
            for (let i = 0; i < files.length; i++) {
                addImage(files[i]);
            }
        });

        fullScreen.onclick = () => {
            fullScreen.style.display = 'none';
        };
    </script>
</body>
</html>
